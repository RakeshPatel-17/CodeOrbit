name: 'CI / QA Environment Validation'

on:
  pull_request:
    branches:
      - qa

jobs:
  compliance-and-testing:
    name: 'Static Analysis & Regression Testing'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      - name: 'Initialize Bun Runtime Environment'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: 'Install Enterprise Dependencies'
        run: bun install --frozen-lockfile

      - name: 'Execute Linter (Static Code Analysis)'
        run: bun run lint --if-present

      - name: 'Execute Test Suite (Automated QA Regression)'
        run: bun test --if-present
